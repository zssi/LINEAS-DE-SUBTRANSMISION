<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Red Eléctrica - Voltajes</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        #map {
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>

// 🔹 Crear mapa
var map = L.map('map').setView([-0.2, -78.5], 10);

// 🔹 Capa base (OpenStreetMap)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OSM'
}).addTo(map);


// 🔹 🎨 FUNCIÓN DE COLORES POR VOLTAJE
function getColorByVoltaje(v) {
    return v === 230000 ? "#00FFFF" :   // Celeste
           v === 138000 ? "#0000FF" :   // Azul
           v === 69000  ? "#FF00FF" :   // Morado
           v === 46000  ? "#FFA500" :   // Naranja
           v === 22800  ? "#00FF00" :   // Verde
                          "#808080";    // Default
}


// 🔹 🎯 ESTILO DE LÍNEAS
function styleLine(feature) {

    var voltaje = feature.properties.VOLTAJE;

    return {
        color: getColorByVoltaje(voltaje),
        weight: voltaje >= 138000 ? 4 : 2,  // Grosor dinámico
        opacity: 1
    };
}


// 🔹 📂 CARGAR GEOJSON DESDE GITHUB
fetch('LINEAS_EEQ_PBI_COLORES.json')
    .then(response => response.json())
    .then(data => {

        L.geoJSON(data, {
            style: styleLine,

            onEachFeature: function (feature, layer) {
                layer.bindPopup(
                    "<b>Voltaje:</b> " + feature.properties.VOLTAJE + " V"
                );
            }

        }).addTo(map);

    });

</script>

</body>
</html>
